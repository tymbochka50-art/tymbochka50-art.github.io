<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img id="userAvatar" class="avatar" src="" alt="Аватар пользователя">
        <h1 id="userName" class="user-name"></h1>
        
        <div class="user-info">
            <div class="info-item">
                <span class="info-label">Фамилия:</span>
                <span id="userLastName" class="info-value"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Описание (Bio):</span>
                <span id="userBio" class="info-value"></span>
            </div>
        </div>
        
        <div id="subscriptionStatus" class="subscription-status"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
