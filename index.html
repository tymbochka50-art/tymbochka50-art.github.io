<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid #667eea;
            object-fit: cover;
        }
        
        .user-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info-item {
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .info-label {
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #333;
            word-break: break-word;
        }
        
        .subscription-status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
        }
        
        .subscribed {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .not-subscribed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
        }
        
        .channel-link {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .channel-link:hover {
            text-decoration: underline;
        }
        
        .subscribe-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .subscribe-btn:hover {
            background: #5a6fd8;
        }
        
        .debug-info {
            background: #f1f3f4;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="userAvatar" class="avatar" src="" alt="Аватар пользователя">
        <h1 id="userName" class="user-name"></h1>
        
        <div class="user-info">
            <div class="info-item">
                <span class="info-label">Фамилия:</span>
                <span id="userLastName" class="info-value"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Описание (Bio):</span>
                <span id="userBio" class="info-value"></span>
            </div>
        </div>

                <!-- Добавьте этот блок после user-info -->
<div class="coins-section">
    <div class="coins-balance">
        <span class="coins-icon">🪙</span>
        <span id="userCoins">0</span> монет
    </div>
    <div class="coins-info">
        <small>Подпишись на канал и получай +10 монет ежедневно!</small>
    </div>
</div>
        
        <div id="subscriptionStatus" class="subscription-status"></div>
        
        <div class="debug-info">
            <strong>Debug Info:</strong><br>
            User ID: <span id="debugUserId"></span><br>
            Backend: <span id="debugBackend"></span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
