<!DOCTYPE html>
<html>
<head>
    <title>3D Мультиплеерная Игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin: 5px 0;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .server-list {
            margin: 30px 0;
        }
        
        .server-item {
            background: #f8f9fa;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            text-align: left;
        }
        
        .server-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .server-info {
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-count {
            background: #e9ecef;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: bold;
        }
        
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            min-width: 200px;
        }
        
        .hud-item {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }
        
        .controls h3 {
            margin-bottom: 15px;
        }
        
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            min-width: 40px;
        }
        
        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        
        .username-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
        }

        .player-label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            transform: translate(-50%, -100%);
            pointer-events: none;
            z-index: 100;
        }

        .debug-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="container">
        <h1>🎮 3D Мультиплеер</h1>
        <div id="error" class="error"></div>
        <input type="text" id="username" placeholder="Введите имя игрока (2-20 символов)" maxlength="20">
        <button class="btn" onclick="login()">Войти в игру</button>
    </div>

    <div id="serverContainer" class="container" style="display: none;">
        <h1>🌐 Выбор сервера</h1>
        <div id="serverList" class="server-list"></div>
        <button class="btn btn-secondary" onclick="goBack()">← Назад</button>
    </div>

    <div id="gameScreen" style="display: none;">
        <div id="gameContainer"></div>
        <div id="hud">
            <div class="hud-item">
                <span>Координаты:</span>
                <span id="coords">X: 0.00 Y: 1.00 Z: 0.00</span>
            </div>
            <div class="hud-item">
                <span>Игроков онлайн:</span>
                <span id="playerCount">1</span>
            </div>
            <div class="hud-item">
                <span>FPS:</span>
                <span id="fps">60</span>
            </div>
            <div class="hud-item">
                <span>Статус:</span>
                <span id="connectionStatus">Подключение...</span>
            </div>
        </div>
        <div id="usernameDisplay" class="username-display"></div>
        <div class="controls">
            <h3>Управление</h3>
            <div>
                <div class="key">W</div>
                <div class="key">↑</div>
                <span>Вперёд</span>
            </div>
            <div>
                <div class="key">A</div>
                <div class="key">←</div>
                <span>Влево</span>
            </div>
            <div>
                <div class="key">S</div>
                <div class="key">↓</div>
                <span>Назад</span>
            </div>
            <div>
                <div class="key">D</div>
                <div class="key">→</div>
                <span>Вправо</span>
            </div>
        </div>
        <div id="debugPanel" class="debug-panel" style="display: none;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        // ================= КОНФИГУРАЦИЯ =================
        const SERVER_URL = 'https://game-server-beige.vercel.app';
        const DEBUG = true; // Включить отладку в консоли
        
        // ================= ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =================
        let username = '';
        let selectedServer = '';
        let game = null;
        let debugLogs = [];
        
        // ================= ФУНКЦИИ ИНТЕРФЕЙСА =================
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
            logDebug('ERROR: ' + message);
        }

        function updateConnectionStatus(status, color = 'white') {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = status;
            statusEl.style.color = color;
        }

        function logDebug(message) {
            if (!DEBUG) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            debugLogs.push(logMessage);
            
            // Ограничиваем количество логов
            if (debugLogs.length > 10) {
                debugLogs.shift();
            }
            
            // Обновляем панель отладки
            const debugPanel = document.getElementById('debugPanel');
            debugPanel.innerHTML = debugLogs.map(log => `<div>${log}</div>`).join('');
            debugPanel.style.display = 'block';
            
            // Также выводим в консоль
            console.log(logMessage);
        }

        async function login() {
            const input = document.getElementById('username');
            username = input.value.trim();
            
            if (username.length < 2 || username.length > 20) {
                showError('Имя должно быть от 2 до 20 символов');
                return;
            }
            
            logDebug(`Пользователь пытается войти: ${username}`);
            
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('serverContainer').style.display = 'block';
            await loadServers();
        }

        function goBack() {
            document.getElementById('serverContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
        }

        async function loadServers() {
            try {
                logDebug(`Запрашиваю список серверов с ${SERVER_URL}/api/servers`);
                const response = await fetch(`${SERVER_URL}/api/servers`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const servers = await response.json();
                logDebug(`Получено серверов: ${servers.length}`);
                
                const container = document.getElementById('serverList');
                container.innerHTML = '';
                
                servers.forEach(server => {
                    const serverElement = document.createElement('div');
                    serverElement.className = 'server-item';
                    serverElement.innerHTML = `
                        <div class="server-name">${server.name}</div>
                        <div class="server-info">
                            <span>${server.description || 'Основной сервер'}</span>
                            <span class="player-count">${server.players}/${server.maxPlayers}</span>
                        </div>
                        <button class="btn" style="margin-top: 10px;" onclick="joinServer('${server.id}')">
                            ${server.players >= server.maxPlayers ? '❌ Переполнен' : '✅ Подключиться'}
                        </button>
                    `;
                    container.appendChild(serverElement);
                });
            } catch (error) {
                logDebug(`Ошибка загрузки серверов: ${error.message}`);
                showError('Не удалось загрузить список серверов. Проверьте консоль для подробностей.');
                console.error('Ошибка загрузки серверов:', error);
            }
        }

        function joinServer(serverId) {
            selectedServer = serverId;
            
            document.getElementById('serverContainer').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('usernameDisplay').textContent = username;
            
            startGame();
        }

        // ================= КЛАСС ИГРЫ =================
        class Game {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.players = {};
                this.playerId = null;
                this.socket = null;
                this.playerLabels = {};
                
                this.keys = {};
                this.playerSpeed = 0.15;
                this.playerPosition = { x: 0, y: 1, z: 0 };
                this.lastUpdate = Date.now();
                this.fpsCounter = 0;
                this.lastFpsUpdate = Date.now();
                this.lastMovementUpdate = 0;
                this.movementUpdateInterval = 100; // Отправлять обновления каждые 100мс
                
                logDebug('Инициализация игры...');
                this.init();
            }

            init() {
                try {
                    // Инициализация Three.js
                    this.scene = new THREE.Scene();
                    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    this.renderer = new THREE.WebGLRenderer({ 
                        antialias: true,
                        alpha: true
                    });
                    
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.renderer.shadowMap.enabled = true;
                    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    this.renderer.setPixelRatio(window.devicePixelRatio);
                    
                    const gameContainer = document.getElementById('gameContainer');
                    gameContainer.innerHTML = '';
                    gameContainer.appendChild(this.renderer.domElement);
                    
                    // Настройка камеры (вид от третьего лица)
                    this.camera.position.set(0, 3, 5);
                    
                    // Освещение
                    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                    this.scene.add(ambientLight);
                    
                    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                    directionalLight.position.set(10, 20, 5);
                    directionalLight.castShadow = true;
                    directionalLight.shadow.camera.left = -20;
                    directionalLight.shadow.camera.right = 20;
                    directionalLight.shadow.camera.top = 20;
                    directionalLight.shadow.camera.bottom = -20;
                    this.scene.add(directionalLight);
                    
                    // Небо
                    this.scene.background = new THREE.Color(0x87CEEB);
                    
                    // Создание мира
                    this.createWorld();
                    
                    // Управление
                    this.setupControls();
                    
                    // Подключение к серверу
                    this.connectToServer();
                    
                    // Запуск анимации
                    this.animate();
                    
                    // Обработка изменения размера окна
                    window.addEventListener('resize', () => this.onWindowResize());
                    
                    // Обработка закрытия окна
                    window.addEventListener('beforeunload', () => {
                        if (this.socket) {
                            this.socket.disconnect();
                        }
                    });
                    
                    logDebug('Игра инициализирована');
                } catch (error) {
                    logDebug(`Ошибка инициализации игры: ${error.message}`);
                    showError('Ошибка инициализации игры');
                }
            }

            createWorld() {
                try {
                    // Пол
                    const floorGeometry = new THREE.PlaneGeometry(40, 40);
                    const floorMaterial = new THREE.MeshPhongMaterial({ 
                        color: 0x228B22,
                        side: THREE.DoubleSide
                    });
                    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                    floor.rotation.x = Math.PI / 2;
                    floor.receiveShadow = true;
                    this.scene.add(floor);
                    
                    // Границы
                    this.createWall(-20, 2.5, 0, 0.1, 5, 40); // Левая стена
                    this.createWall(20, 2.5, 0, 0.1, 5, 40);  // Правая стена
                    this.createWall(0, 2.5, -20, 40, 5, 0.1); // Задняя стена
                    this.createWall(0, 2.5, 20, 40, 5, 0.1);  // Передняя стена
                    
                    // Декоративные кубики
                    const cubeMaterial = new THREE.MeshPhongMaterial({ color: 0xFF4500 });
                    for (let i = 0; i < 15; i++) {
                        const size = Math.random() * 1.5 + 0.5;
                        const cube = new THREE.Mesh(
                            new THREE.BoxGeometry(size, size, size),
                            cubeMaterial
                        );
                        cube.position.set(
                            Math.random() * 30 - 15,
                            size / 2,
                            Math.random() * 30 - 15
                        );
                        cube.castShadow = true;
                        cube.receiveShadow = true;
                        this.scene.add(cube);
                    }
                    
                    // Центральная платформа
                    const platform = new THREE.Mesh(
                        new THREE.CylinderGeometry(3, 3, 0.5, 32),
                        new THREE.MeshPhongMaterial({ color: 0x8B4513 })
                    );
                    platform.position.set(0, 0.25, 0);
                    platform.receiveShadow = true;
                    this.scene.add(platform);
                    
                    logDebug('Мир создан');
                } catch (error) {
                    logDebug(`Ошибка создания мира: ${error.message}`);
                }
            }

            createWall(x, y, z, width, height, depth) {
                const wallGeometry = new THREE.BoxGeometry(width, height, depth);
                const wallMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                const wall = new THREE.Mesh(wallGeometry, wallMaterial);
                wall.position.set(x, y, z);
                wall.receiveShadow = true;
                wall.castShadow = true;
                this.scene.add(wall);
            }

            setupControls() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
                
                logDebug('Управление настроено');
            }

            updateMovement() {
                try {
                    const now = Date.now();
                    const deltaTime = Math.min((now - this.lastUpdate) / 16.67, 2.0); // Ограничиваем deltaTime
                    this.lastUpdate = now;
                    
                    let moveX = 0;
                    let moveZ = 0;
                    
                    if (this.keys['w'] || this.keys['arrowup']) moveZ -= this.playerSpeed * deltaTime;
                    if (this.keys['s'] || this.keys['arrowdown']) moveZ += this.playerSpeed * deltaTime;
                    if (this.keys['a'] || this.keys['arrowleft']) moveX -= this.playerSpeed * deltaTime;
                    if (this.keys['d'] || this.keys['arrowright']) moveX += this.playerSpeed * deltaTime;
                    
                    // Ограничение движения границами
                    const newX = this.playerPosition.x + moveX;
                    const newZ = this.playerPosition.z + moveZ;
                    
                    if (Math.abs(newX) < 19) this.playerPosition.x = newX;
                    if (Math.abs(newZ) < 19) this.playerPosition.z = newZ;
                    
                    // Обновление камеры (third-person)
                    const cameraDistance = 8;
                    const cameraHeight = 5;
                    const lookAtHeight = 1;
                    
                    this.camera.position.x = this.playerPosition.x;
                    this.camera.position.z = this.playerPosition.z + cameraDistance;
                    this.camera.position.y = this.playerPosition.y + cameraHeight;
                    this.camera.lookAt(
                        this.playerPosition.x,
                        this.playerPosition.y + lookAtHeight,
                        this.playerPosition.z
                    );
                    
                    // Обновление HUD
                    document.getElementById('coords').textContent = 
                        `X: ${this.playerPosition.x.toFixed(2)} Y: ${this.playerPosition.y.toFixed(2)} Z: ${this.playerPosition.z.toFixed(2)}`;
                    
                    // Отправка обновления на сервер (с ограничением частоты)
                    if (this.socket && this.playerId && now - this.lastMovementUpdate > this.movementUpdateInterval) {
                        this.lastMovementUpdate = now;
                        
                        this.socket.emit('playerMovement', {
                            room: selectedServer,
                            position: this.playerPosition,
                            rotation: { x: 0, y: 0, z: 0 }
                        });
                    }
                } catch (error) {
                    logDebug(`Ошибка обновления движения: ${error.message}`);
                }
            }

            connectToServer() {
                try {
                    logDebug(`Подключаюсь к серверу: ${SERVER_URL}`);
                    updateConnectionStatus('Подключение...', 'yellow');
                    
                    this.socket = io(SERVER_URL, {
                        transports: ['websocket', 'polling'],
                        path: '/socket.io/',
                        reconnection: true,
                        reconnectionAttempts: 10,
                        reconnectionDelay: 1000,
                        reconnectionDelayMax: 5000,
                        timeout: 20000
                    });
                    
                    // Обработчики событий Socket.IO
                    this.socket.on('connect', () => {
                        logDebug(`✅ Соединение установлено! ID: ${this.socket.id}`);
                        updateConnectionStatus('Подключено', '#0f0');
                        this.playerId = this.socket.id;
                        
                        // Отправляем запрос на присоединение
                        this.socket.emit('join', {
                            username: username,
                            room: selectedServer
                        });
                        
                        logDebug(`Отправляю запрос на присоединение: ${username} -> ${selectedServer}`);
                    });
                    
                    this.socket.on('connect_error', (error) => {
                        logDebug(`❌ Ошибка соединения: ${error.message}`);
                        updateConnectionStatus('Ошибка подключения', 'red');
                        showError('Ошибка подключения к серверу');
                    });
                    
                    this.socket.on('disconnect', (reason) => {
                        logDebug(`📴 Отключение: ${reason}`);
                        updateConnectionStatus('Отключено', 'red');
                    });
                    
                    this.socket.on('welcome', (data) => {
                        logDebug(`👋 Приветствие от сервера: ${JSON.stringify(data)}`);
                    });
                    
                    this.socket.on('serverInfo', (data) => {
                        logDebug(`ℹ️ Информация сервера: ${JSON.stringify(data)}`);
                    });
                    
                    this.socket.on('currentPlayers', (players) => {
                        logDebug(`🎮 Получено игроков: ${Object.keys(players).length}`);
                        
                        Object.values(players).forEach(player => {
                            if (player.id !== this.playerId) {
                                this.addOtherPlayer(player);
                            } else {
                                this.playerPosition = player.position;
                                logDebug(`Моя позиция: x=${player.position.x}, z=${player.position.z}`);
                            }
                        });
                        
                        document.getElementById('playerCount').textContent = Object.keys(players).length;
                    });
                    
                    this.socket.on('newPlayer', (playerData) => {
                        logDebug(`🆕 Новый игрок: ${playerData.username} (${playerData.id})`);
                        
                        if (playerData.id !== this.playerId) {
                            this.addOtherPlayer(playerData);
                            document.getElementById('playerCount').textContent = 
                                parseInt(document.getElementById('playerCount').textContent) + 1;
                        }
                    });
                    
                    this.socket.on('playerMoved', (data) => {
                        const player = this.players[data.id];
                        if (player && player.mesh) {
                            player.mesh.position.set(data.position.x, data.position.y, data.position.z);
                            this.updatePlayerLabel(data.id, data.position);
                        }
                    });
                    
                    this.socket.on('playerDisconnected', (playerId) => {
                        logDebug(`👋 Игрок отключился: ${playerId}`);
                        
                        if (this.players[playerId]) {
                            this.scene.remove(this.players[playerId].mesh);
                            delete this.players[playerId];
                            
                            // Удаляем метку
                            if (this.playerLabels[playerId]) {
                                document.body.removeChild(this.playerLabels[playerId]);
                                delete this.playerLabels[playerId];
                            }
                            
                            document.getElementById('playerCount').textContent = 
                                parseInt(document.getElementById('playerCount').textContent) - 1;
                        }
                    });
                    
                    this.socket.on('error', (message) => {
                        logDebug(`❌ Ошибка сервера: ${message}`);
                        showError(`Ошибка сервера: ${message}`);
                        document.getElementById('gameScreen').style.display = 'none';
                        document.getElementById('serverContainer').style.display = 'block';
                    });
                    
                    this.socket.on('pong', (data) => {
                        logDebug(`🏓 Pong: ${JSON.stringify(data)}`);
                    });
                    
                    logDebug('Обработчики событий Socket.IO установлены');
                } catch (error) {
                    logDebug(`Ошибка подключения к серверу: ${error.message}`);
                    showError('Не удалось подключиться к серверу');
                }
            }

            addOtherPlayer(playerData) {
                try {
                    logDebug(`Добавляю игрока: ${playerData.username}`);
                    
                    const geometry = new THREE.BoxGeometry(0.8, 1.8, 0.8);
                    const material = new THREE.MeshPhongMaterial({ 
                        color: 0x1E90FF,
                        shininess: 30
                    });
                    const playerMesh = new THREE.Mesh(geometry, material);
                    
                    playerMesh.position.set(
                        playerData.position.x,
                        playerData.position.y,
                        playerData.position.z
                    );
                    
                    playerMesh.castShadow = true;
                    playerMesh.receiveShadow = true;
                    
                    this.scene.add(playerMesh);
                    this.players[playerData.id] = {
                        mesh: playerMesh,
                        username: playerData.username
                    };
                    
                    // Создаем метку с именем игрока
                    this.createPlayerLabel(playerData.id, playerData.username, playerData.position);
                    
                    logDebug(`Игрок ${playerData.username} добавлен на сцену`);
                } catch (error) {
                    logDebug(`Ошибка добавления игрока: ${error.message}`);
                }
            }

            createPlayerLabel(playerId, username, position) {
                try {
                    const label = document.createElement('div');
                    label.className = 'player-label';
                    label.textContent = username;
                    label.id = `player-label-${playerId}`;
                    document.body.appendChild(label);
                    
                    this.playerLabels[playerId] = label;
                    this.updatePlayerLabel(playerId, position);
                    
                    logDebug(`Метка создана для игрока: ${username}`);
                } catch (error) {
                    logDebug(`Ошибка создания метки игрока: ${error.message}`);
                }
            }

            updatePlayerLabel(playerId, position) {
                try {
                    const label = this.playerLabels[playerId];
                    if (!label || !this.camera) return;
                    
                    // Преобразуем 3D координаты в 2D экранные координаты
                    const vector = new THREE.Vector3(position.x, position.y + 2.2, position.z);
                    vector.project(this.camera);
                    
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                    
                    // Проверяем, находится ли точка перед камерой
                    if (vector.z < 1) {
                        label.style.left = `${x}px`;
                        label.style.top = `${y}px`;
                        label.style.display = 'block';
                    } else {
                        label.style.display = 'none';
                    }
                } catch (error) {
                    // Тихий сбой - не логируем постоянно
                }
            }

            onWindowResize() {
                try {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                } catch (error) {
                    logDebug(`Ошибка изменения размера окна: ${error.message}`);
                }
            }

            updateFPS() {
                try {
                    this.fpsCounter++;
                    const now = Date.now();
                    if (now - this.lastFpsUpdate >= 1000) {
                        document.getElementById('fps').textContent = this.fpsCounter;
                        this.fpsCounter = 0;
                        this.lastFpsUpdate = now;
                    }
                } catch (error) {
                    logDebug(`Ошибка обновления FPS: ${error.message}`);
                }
            }

            updatePlayerLabels() {
                try {
                    Object.keys(this.players).forEach(playerId => {
                        const player = this.players[playerId];
                        if (player && player.mesh) {
                            this.updatePlayerLabel(playerId, player.mesh.position);
                        }
                    });
                } catch (error) {
                    // Тихий сбой
                }
            }

            animate() {
                try {
                    requestAnimationFrame(() => this.animate());
                    
                    this.updateMovement();
                    this.updateFPS();
                    this.updatePlayerLabels();
                    
                    this.renderer.render(this.scene, this.camera);
                } catch (error) {
                    logDebug(`Ошибка анимации: ${error.message}`);
                }
            }
        }

        function startGame() {
            try {
                logDebug('Запуск игры...');
                game = new Game();
            } catch (error) {
                logDebug(`Ошибка запуска игры: ${error.message}`);
                showError('Ошибка запуска игры');
            }
        }

        // ================= ИНИЦИАЛИЗАЦИЯ =================
        logDebug('Скрипт загружен');
        logDebug(`Frontend URL: ${window.location.origin}`);
        logDebug(`Backend URL: ${SERVER_URL}`);
        
        // Проверяем доступность сервера при загрузке
        fetch(`${SERVER_URL}/health`)
            .then(response => {
                if (response.ok) {
                    logDebug('Сервер доступен');
                } else {
                    logDebug('Сервер недоступен');
                }
            })
            .catch(error => {
                logDebug(`Ошибка проверки сервера: ${error.message}`);
            });
    </script>
</body>
</html>
